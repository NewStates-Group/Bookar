services:
  database:
    image: postgresql:17-alpine
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: BookarDB 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 3
      timeout: 5s
  backend:
    build: ./backend
    command: sh -c python manage.py migrate && \
      python manage.py runservice 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@database:5432/BookarDB
    volumes:
      - ./backend:/app
    depends_on:
      database:
        condition: service_healthy
        restart: true
  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend
volumes:
  postgres_data: