services:
  worker:
    container_name: "worker"
    image: backend
    env_file: ".env"
    entrypoint: ""
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
  db:
    container_name: "postgres"
    image: postgres:17-alpine
    env_file: ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    container_name: "redis"
    image: redis:7-alpine
    env_file: ".env"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    container_name: "backend"
    build: ./backend
    image: backend
    env_file: ".env"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    container_name: "frontend"
    build: ./frontend
    env_file: ".env"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      backend:
        condition: service_healthy
  flower:
    container_name: "flower"
    image: backend
    env_file: ".env"
    entrypoint: ""
    command: sh -c "celery -A core --broker=${REDIS_URL} flower --address=0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
  adminer:
    container_name: "adminer"
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
