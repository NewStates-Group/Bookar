services:
  nginx:
    container_name: "nginx"
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      cert-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      flower:
        condition: service_healthy
    command: /bin/sh -c "sh -c 'sleep 5m; nginx -s reload' & while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
  cert-init:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "mkdir -p /etc/letsencrypt/live/api.bookar.study && [ -f /etc/letsencrypt/live/api.bookar.study/fullchain.pem ] || openssl req -x509 -nodes -newkey rsa:2048 -days 1 -keyout /etc/letsencrypt/live/api.bookar.study/privkey.pem -out /etc/letsencrypt/live/api.bookar.study/fullchain.pem -subj '/CN=localhost'"
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: /bin/sh -c "while :; do certbot certonly --webroot -w /var/www/certbot --email newstates.bookar@gmail.com --agree-tos --no-eff-email --keep-until-expiring --domains api.bookar.study,bookar.study,flower.bookar.study; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    depends_on:
     nginx:
       condition: service_started
  redis:
    container_name: "redis"
    image: redis:7-alpine
    env_file: ".env"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  worker:
    container_name: "worker"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    command: celery -A core worker -l info
    depends_on:
      redis:
        condition: service_healthy
  backend:
    container_name: "backend"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
  frontend:
    container_name: "frontend"
    image: ${FRONTEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
  flower:
    container_name: "flower"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    command: sh -c "celery -A core --broker=${REDIS_URL} flower --address=0.0.0.0 --port=5555 --basic-auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      worker:
        condition: service_started
