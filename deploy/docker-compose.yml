services:
  redis:
    container_name: "redis"
    image: redis:7-alpine
    env_file: ".env"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  worker:
    container_name: "worker"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    command: celery -A core worker -l info
    depends_on:
      redis:
        condition: service_healthy
  backend:
    container_name: "backend"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
  frontend:
    container_name: "frontend"
    image: ${FRONTEND_IMAGE}
    env_file: ".env"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
  flower:
    container_name: "flower"
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    ports:
      - "5555:5555"
    command: sh -c "celery -A core --broker=${REDIS_URL} flower --address=0.0.0.0 --port=5555 --basic-auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      worker:
        condition: service_started
