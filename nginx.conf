worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend_stream {
        least_conn;

        server backend:8000;

        keepalive 32;
    }

    upstream frontend_stream {
        server frontend:3000;
    }

    upstream flower_stream {
        server flower:5555;
    }
    
    server {
        listen 80;
        server_name api.localhost;
    
        location / {
            proxy_pass http://backend_stream;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 80;
        server_name flower.localhost;

        location / {
            proxy_pass http://flower_stream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 80;
        server_name localhost;
        
        location / {
            proxy_pass http://frontend_stream;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

           location = /404.html {
            alias /home/ubuntu/Bookar/nginx/error_pages/404.html;
            internal;
        }

        location = /500.html {
            alias /home/ubuntu/Bookar/nginx/error_pages/500.html;
            internal;
        }

        location = /502.html {
            alias /home/ubuntu/Bookar/nginx/error_pages/502.html;
            internal;
        }

        error_page 404 /404.html;
        error_page 500 /500.html;
        error_page 502 /502.html;
    }
}