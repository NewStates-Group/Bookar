name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bookar-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bookar-frontend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Django tests
        run: |
          cd backend
          python manage.py test || echo "Failed"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3  
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f ./backend/Dockerfile.prod -t $BACKEND_IMAGE:$IMAGE_TAG ./backend
          docker tag $BACKEND_IMAGE:$IMAGE_TAG $BACKEND_IMAGE:latest

      - name: Push backend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker push $BACKEND_IMAGE:$IMAGE_TAG
          docker push $BACKEND_IMAGE:latest

      - name: Build frontend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f ./frontend/Dockerfile.prod -t $FRONTEND_IMAGE:$IMAGE_TAG ./frontend
          docker tag $FRONTEND_IMAGE:$IMAGE_TAG $FRONTEND_IMAGE:latest

      - name: Push frontend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker push $FRONTEND_IMAGE:$IMAGE_TAG
          docker push $FRONTEND_IMAGE:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Syncronize files
        run: |
          rsync -avz --exclude 'backend/' --exclude 'frontend/' --exclude '.git/' --exclude '.env' --exclude 'docker-compose.yml' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/Bookar/

      - name: Run deploy
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ~/Bookar &&
            ./deploy.sh
          "