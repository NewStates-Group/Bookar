name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bookar-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bookar-frontend
  NEWRELIC_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bookar-new-relic

jobs:
