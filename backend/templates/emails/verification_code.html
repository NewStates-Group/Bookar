<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #000; color: #fff; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 30px; border: 1px solid #eee; border-top: none; border-radius: 0 0 8px 8px; }
        .code-box { background: #f4f4f4; padding: 20px; text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 5px; margin: 20px 0; border-radius: 4px; border: 1px dashed #ccc; }
        .footer { margin-top: 20px; text-align: center; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Verificação Bookar</h1>
        </div>
        <div class="content">
            <p>Olá,</p>
            <p>Seu código de verificação para concluir seu registo no Bookar é:</p>
            <div class="code-box">{{ code }}</div>
            <p>Este código expira em 10 minutos. Se você não solicitou este código, ignore este e-mail.</p>
            <p>Bons estudos!<br>Equipe Bookar</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 Bookar. Todos os direitos reservados.</p>
        </div>
    </div>
</body>
</html>
