services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      flower:
        condition: service_healthy
  worker:
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    command: celery -A core worker -l info
  backend:
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  frontend:
    image: ${FRONTEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
  flower:
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    entrypoint: "" 
    command: sh -c "celery -A core --broker=${REDIS_URL} flower --address=0.0.0.0 --port=5555 --basic-auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      worker:
        condition: service_started
