services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      flower:
        condition: service_healthy
  worker:
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    command: celery -A core worker -l info
  backend:
    image: ${BACKEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:8000/healthcheck/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  frontend:
    image: ${FRONTEND_IMAGE}
    env_file: ".env"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://frontend:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
  flower:
    image: ${BACKEND_IMAGE}
    command: sh -c "celery -A core --broker=${REDIS_URL} flower --port=5555 --basic-auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://flower:5555/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
