worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend_stream {
        least_conn;

        server backend:8000;

        keepalive 32;
    }

    upstream frontend_stream {
        server frontend:3000;
    }

    upstream flower_stream {
        server flower:5555;
    }

    server {
        listen 80;
        server_name api.bookar.study;

        location / {
            proxy_pass http://backend_stream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 80;
        server_name flower.bookar.study;

        location / {
            proxy_pass http://flower_stream;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name bookar.study;

        location / {
            proxy_pass http://frontend_stream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}